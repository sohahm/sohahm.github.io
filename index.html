<html>
  <head>
    <style>
      body {transition: opacity ease-in 0.2s; } 
      body[unresolved] {opacity: 0; display: block; overflow: hidden; position: relative; } 
    </style>
    <title>HALA Eid Greeting </title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
      @font-face {
        font-family: "FFShamelRounded";
        src: url("./fonts/FFShamelRounded-Bold.otf") format("opentype");
        font-weight: bold;
        font-style: normal;
      }
      body{
        text-align:center;
        font-family:Arial;
      }
      
      #card{
        position:relative;
        display:inline-block;
        margin-top:20px;
      }
      
      #card img{
        width:600px;
        display:block;
      }
      
      #nameText{
        position:absolute;
        top:48%;
        width:100%;
        font-size:40px;
        font-weight:bold;
        color:#000003;
        text-align:center;
      }
      .arabic {
        font-family: "FFShamelRounded";
      }
    </style>
  </head>
    <body>
      <h2>HALA Eid Greeting </h2>
      <input type="text" id="username" placeholder="Enter your name">
      <br><br>
      <button onclick="generateCard()">Generate</button>
      <button onclick="downloadCard()">Download</button>
      <br><br>
      <div id="card">
        <img id="cardImage" src="https://www.image2url.com/r2/default/images/1779631070354-7307ed5b-cc76-465e-a748-1520f30605a5.jpeg" alt="image" crossorigin="anonymous">
        <div id="nameText"></div>
      </div>
      <script>
        function isArabic(text) {
          return /[\u0600-\u06FF]/.test(text);
        }
        function generateCard() {
  var name = document.getElementById("username").value;
  var nameText = document.getElementById("nameText");

  nameText.innerText = name;

  if (isArabic(name)) {
    nameText.classList.add("arabic");
  } else {
    nameText.classList.remove("arabic");
  }
}
        function downloadCard()
        {
          html2canvas(document.querySelector("#card"),{
            useCORS:true,
            scale:2,
            backgroundColor:null
          }).then(canvas=>{
            var link=document.createElement("a");
            link.download="hala-eid-greeting.png";
            link.href=canvas.toDataURL("image/png");
            link.click();
          });
        }
      </script>
    </body>
</html>
