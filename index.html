<html>
  <head>
    <style>
      body {transition: opacity ease-in 0.2s; } 
      body[unresolved] {opacity: 0; display: block; overflow: hidden; position: relative; } 
    </style>
    <title>HALA Eid Greeting </title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
      body{
        text-align:center;
        font-family:Arial;
      }
      
      #card{
        position:relative;
        display:inline-block;
        margin-top:20px;
      }
      
      #card img{
        width:600px;
        display:block;
      }
      
      #nameText{
        position:absolute;
        bottom:80px;
        width:100%;
        font-size:28px;
        font-weight:bold;
        color:#fff;
        text-align:center;
      }
    </style>
  </head>
    <body>
      <h2>HALA Eid Greeting </h2>
      <input type="text" id="username" placeholder="Enter your name">
      <br><br>
      <button onclick="generateCard()">Generate</button>
      <button onclick="downloadCard()">Download</button>
      <br><br>
      <div id="card">
        <img id="cardImage" src="https://cdn.hala.com/images/others/Hala-Eid-Adha.png" alt="image" crossorigin="anonymous">
        <div id="nameText"></div>
      </div>
      <script>
        function generateCard()
        {
          var name=document.getElementById("username").value;
          document.getElementById("nameText").innerText=name;
        }
        function downloadCard()
        {
          html2canvas(document.querySelector("#card"),{
            useCORS:true,
            scale:2
          }).then(canvas=>{
            var link=document.createElement("a");
            link.download="hala-eid-greeting.png";
            link.href=canvas.toDataURL("image/png");
            link.click();
          });
        }
      </script>
    </body>
</html>
